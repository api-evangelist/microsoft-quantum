    description: >-
      Azure Quantum Workspace Services data-plane REST API. Submit and manage quantum jobs, sessions (hybrid
      quantum-classical workflows), provider status checks, quotas, top-level items, and storage SAS URIs against an
      Azure Quantum workspace. Targets quantum hardware from IonQ, Quantinuum, Pasqal, and Rigetti plus simulators and
      emulators. Current preview version 2026-01-15-preview.
