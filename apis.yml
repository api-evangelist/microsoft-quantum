    name: Azure Quantum Resource Manager API
    tags:
      - Quantum
      - ARM
      - Resource Manager
      - Workspaces
      - Provisioning
    humanURL: https://learn.microsoft.com/en-us/azure/templates/microsoft.quantum/workspaces
    properties:
      - url: https://learn.microsoft.com/en-us/azure/templates/microsoft.quantum/workspaces
        type: Documentation
      - url: >-
          https://github.com/Azure/azure-rest-api-specs/tree/main/specification/quantum/resource-manager/Microsoft.Quantum/preview/2025-12-15-preview
        type: Documentation
      - url: openapi/azure-quantum-resource-manager-openapi.json
        type: OpenAPI
    description: >-
      Microsoft.Quantum Azure Resource Manager (ARM) control-plane API. Create, read, update, delete, and list Azure
      Quantum workspaces; list provider offerings per region; check workspace name availability; list and regenerate
      workspace keys; manage suite offers. Current preview version 2025-12-15-preview.
  - aid: microsoft-quantum:qsharp-language
    name: Q# Quantum Programming Language
    tags:
      - Quantum
      - Programming Language
      - Q#
      - QDK
      - Open Source
    humanURL: https://learn.microsoft.com/en-us/azure/quantum/qsharp-overview
    properties:
      - url: https://learn.microsoft.com/en-us/azure/quantum/qsharp-overview
        type: Documentation
      - url: https://learn.microsoft.com/en-us/qsharp/api/
        type: Documentation
      - url: https://github.com/microsoft/qdk
        type: GitHubRepository
      - url: https://github.com/microsoft/qsharp-language
        type: GitHubRepository
    description: >-
      Q# is Microsoft's open-source, hardware-agnostic quantum programming language. The Modern QDK compiler is written
      in Rust, ships as a VS Code extension and Python package, and powers quantum.microsoft.com. Q# expresses programs
      as classical control-flow that operates on qubits without modeling the quantum state directly, and targets every
      Azure Quantum provider plus the Resource Estimator.
  - aid: microsoft-quantum:resource-estimator
    name: Microsoft Quantum Resource Estimator
    tags:
      - Quantum
      - Resource Estimation
      - Fault Tolerance
      - QEC
    humanURL: https://learn.microsoft.com/en-us/azure/quantum/intro-to-resource-estimation
    properties:
      - url: https://learn.microsoft.com/en-us/azure/quantum/intro-to-resource-estimation
        type: Documentation
      - url: https://learn.microsoft.com/en-us/azure/quantum/overview-resources-estimator
        type: Documentation
      - url: https://github.com/microsoft/qdk
        type: GitHubRepository
    description: >-
      Open-source post-layout physical resource estimator for fault-tolerant quantum algorithms. Compute qubit counts,
      T-state counts, runtime, and code-distance requirements across configurable qubit physical parameters, QEC
      schemes, and error budgets. Ships inside the QDK and runs locally or as an Azure Quantum target.
  - aid: microsoft-quantum:azure-quantum-python-sdk
    name: Azure Quantum Python SDK
    tags:
      - Quantum
      - SDK
      - Python
      - Qiskit
      - Cirq
    humanURL: https://github.com/microsoft/azure-quantum-python
    properties:
      - url: https://github.com/microsoft/azure-quantum-python
        type: GitHubRepository
      - url: https://pypi.org/project/azure-quantum/
        type: SDK
    description: >-
      Python SDK for submitting jobs to Azure Quantum. Supports Q#, Qiskit, Cirq, and pass-through provider input
      formats; manages workspaces, jobs, sessions, and target queries against the Workspace data-plane API.
