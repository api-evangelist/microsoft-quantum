position: Producing
description: >-
  Microsoft Azure Quantum is Microsoft's cloud quantum computing service — an open, multi-vendor platform that provides
  access to quantum hardware from IonQ, Quantinuum, Pasqal, and Rigetti alongside Microsoft's own Q# programming
  language, Quantum Development Kit (QDK), and post-layout fault-tolerant Resource Estimator. The Azure Quantum
  Workspace REST API exposes jobs, sessions, providers, quotas, items, and storage surfaces; the Microsoft.Quantum ARM
  provider handles workspace provisioning. The QDK is free and open source, ships as a VS Code extension and Python
  package, and supports Q#, Qiskit, Cirq, and OpenQASM. Azure Quantum Elements layers in chemistry, materials, and HPC
  simulation for scientific discovery, with Copilot-assisted workflows on quantum.microsoft.com.
