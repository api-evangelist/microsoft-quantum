naftiko: 1.0.0-alpha2
info:
  label: Azure Quantum Workspace — Provider Status
  description: Read availability and queue depth for every quantum target registered to an Azure Quantum workspace.
  tags:
    - Azure Quantum
    - Providers
    - Targets
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      AZURE_QUANTUM_BEARER: AZURE_QUANTUM_BEARER
      AZURE_SUBSCRIPTION_ID: AZURE_SUBSCRIPTION_ID
      AZURE_RESOURCE_GROUP: AZURE_RESOURCE_GROUP
      AZURE_QUANTUM_WORKSPACE: AZURE_QUANTUM_WORKSPACE
capability:
  consumes:
    - type: http
      namespace: providers-providers
      baseUri: https://management.azure.com
      resources:
        - name: provider-status
          path: /subscriptions/{{env.AZURE_SUBSCRIPTION_ID}}/resourceGroups/{{env.AZURE_RESOURCE_GROUP}}/providers/Microsoft.Quantum/workspaces/{{env.AZURE_QUANTUM_WORKSPACE}}/providerStatus
          operations:
            - name: getproviderstatus
              method: GET
              description: List Provider Status For All Targets Available In The Workspace.
      authentication:
        type: bearer
        value: '{{env.AZURE_QUANTUM_BEARER}}'
        placement: header
  exposes:
    - type: mcp
      namespace: providers-providers-mcp
      port: 9090
      transport: http
      tools:
        - name: azure-quantum-provider-status
          description: Get availability and queue depth for every Azure Quantum target.
          hints:
            readOnly: true
          call: providers-providers.getproviderstatus
